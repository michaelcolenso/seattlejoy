services:
  - type: web
    name: seattlejoy
    repo: https://github.com/michaelcolenso/seattlejoy
    runtime: node
    plan: free
    branch: master
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        sync: false
      - key: MONGO_URL
        sync: false
